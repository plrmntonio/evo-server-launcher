<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVO Server Launcher — Login</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1a2e; --bg2: #16213e; --accent: #e94560; --accent2: #c73652;
  --text: #e8eaf0; --text2: #9aa3b5; --border: #2a3a5c; --input-bg: #131d33;
  --card: #1e2a45; --red: #e74c3c; --radius: 10px;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 40px 36px;
  width: 340px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.logo { text-align: center; margin-bottom: 32px; }
.logo .icon { font-size: 48px; display: block; margin-bottom: 12px; }
.logo h1 { font-size: 20px; font-weight: 700; }
.logo h1 span { color: var(--accent); }
.logo p { font-size: 13px; color: var(--text2); margin-top: 4px; }

label { display: block; font-size: 12px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
input[type=password] {
  width: 100%; background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 14px; color: var(--text); font-size: 14px;
  outline: none; transition: border-color .15s;
}
input[type=password]:focus { border-color: var(--accent); }

.btn-login {
  width: 100%; margin-top: 20px; padding: 12px;
  background: var(--accent); color: white; border: none; border-radius: 6px;
  font-size: 15px; font-weight: 700; cursor: pointer; transition: all .15s;
}
.btn-login:hover { background: var(--accent2); }
.btn-login:disabled { opacity: .5; cursor: not-allowed; }

.error {
  margin-top: 14px; padding: 10px 14px; background: rgba(231,76,60,.12);
  border: 1px solid var(--red); border-radius: 6px;
  font-size: 13px; color: var(--red); display: none; text-align: center;
}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <span class="icon">🏎️</span>
    <h1>EVO <span>Server Launcher</span></h1>
    <p>Enter admin password to continue</p>
  </div>
  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autofocus
    onkeydown="if(event.key==='Enter') login()">
  <button class="btn-login" onclick="login()" id="loginBtn">Login</button>
  <div class="error" id="errorMsg">Wrong password. Try again.</div>
</div>

<script>
async function login() {
  const pwd = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  if (!pwd) return;

  btn.disabled = true;
  btn.textContent = 'Logging in...';
  err.style.display = 'none';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const data = await r.json();
    if (data.ok && data.token) {
      sessionStorage.setItem('evo_token', data.token);
      window.location.href = '/app';
    } else {
      err.style.display = 'block';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch (e) {
    err.textContent = 'Connection error. Is the server running?';
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}
</script>
</body>
</html>
